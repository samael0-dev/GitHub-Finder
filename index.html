<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./src/output.css">
        <title>GitHub User Finder</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body class="">
        
        <div class="flex justify-center items-center mt-5 max-md:text-center">
            <img src="./images/git.png" class="h-[80px] mt-1 max-md:h-[60px]">
            <div class="text-[60px] max-md:text-[40px] font-bold">GitHub Profile Viewer</div>
        </div>
        <div class="text-center h-[80px] text-[30px] max-md:text-[20px] text-gray-500">Search any GitHub username to explore their profile</div>

        <div class="flex justify-center gap-1">
            <div class="w-[800px] h-[50px] max-md:w-[300px]">
            <input id="searchInp" type="text" placeholder="search by username" class="w-full rounded-2xl h-[50px] p-3 border-1 shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]">
            </div>
            <button id="btn1" onclick="searchCleaner();
            search();" class="bg-black shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] text-white rounded-2xl w-[100px] h-[50px] cursor-pointer hover:bg-white hover:text-black duration-300 border-1 border-black">Search</button>
        </div>

        <div id="banner1" class="invisible flex justify-center pt-6 ">
            <div class="bg-gray-100 grid grid-cols-6 max-md:w-[400px] w-[900px] h-[230px] shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] rounded-3xl">
                <div class="flex items-center max-md:col-span-2 ml-2"><img id="userImage" class="rounded-[300px] h-[150px] ml-2 max-md:h-[100px] border-2" src=""></div>
                <div class="flex flex-col ml-5 col-span-4">
                    <div id="name" class="font-bold text-[30px] max-md:text-[23px] mt-2"></div>
                    <div id="username" class="text-[20px] text-gray-500"></div>
                    <div id="bio" class=""></div>
                    <div class="flex">
                        <div class="mt-5 text-gray-400">Created On →</div><div id="join" class="mt-5 text-gray-400"></div>
                    </div>
                    <button class="mt-2 hover:bg-black max-md:text-[13px] max-md:w-[120px] text-gray-500 pl-1 font-bold border-1 border-black w-[150px] h-[40px] rounded-3xl cursor-pointer bg-gray-100 hover:text-white duration-300 shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]"><a id="userLink" href="" target="_blank">View on GitHub →</a></button>
                </div>
            </div>
        </div>

        <div id="banner2" class="invisible flex justify-center pt-6">
            <div class="grid grid-cols-4 max-md:grid-rows-2 max-md:grid-cols-2 max-md:gap-2 max-md:w-[400px] w-[900px] h-[200px] gap-5 items-center">
                <div class="bg-gray-100 h-[170px] max-md:h-[100px] rounded-3xl flex flex-col justify-center items-center shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]">
                    <div id="repoCount" class="font-bold text-[30px] max-md:text-[23px]"></div>
                    <div class="font-bold text-gray-400">REPOS</div>
                </div>
                <div class="bg-gray-100 h-[170px] max-md:h-[100px] rounded-3xl flex flex-col justify-center items-center shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]">
                    <div id="followers" class="font-bold text-[30px] max-md:text-[23px]"></div>
                    <div class="font-bold text-gray-400">FOLLOWERS</div>
                    
                </div>
                <div class="bg-gray-100 h-[170px] max-md:h-[100px] rounded-3xl flex flex-col justify-center items-center shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]">
                    <div id="following" class="font-bold text-[30px] max-md:text-[23px]"></div>
                    <div class="font-bold text-gray-400">FOLLOWING</div>
                    
                </div>
                <div class="bg-gray-100 h-[170px] max-md:h-[100px] rounded-3xl flex flex-col justify-center items-center shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)]">
                    <div id="star" class="font-bold text-[30px] max-md:text-[23px]"></div>
                    <div class="font-bold text-gray-400">GISTS</div>
                    
                </div>
            </div>
        </div>

        <div id="repository" class="invisible flex justify-center pt-6">
            <div class="w-[900px] max-md:w-[400px]">
                <div id="repo" class="bg-gray-100 grid grid-cols-2 max-md:grid-cols-1 auto-cols-auto place-items-center w-[900px] max-md:w-[400px] rounded-3xl shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] justify-center">
                    <div id="repositorycard" class="text-gray-400 col-span-2 justify-self-start ml-5 mt-5 mb-4 max-md:col-span-1 font-bold max-md:text-[13px]">REPOSITORIES →</div>
                </div>
            </div>
        </div>

<!--ERROR PAGE-->
        <div id="errorPage" class="invisible flex justify-center items-center pt-6 max-md:w-[380px] place-self-center">
            <div class="bg-gray-100 w-[900px] h-[200px] max-md:w-full shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] rounded-3xl">
                <div class="flex flex-col ml-5 items-center w-full h-full justify-center max-md:place-self-center text-center">
                    <div class="text-[30px] max-md:text-[23px] text-gray-500">API RAN OUT OF BREATH 😞</div>
                    <div class="text-[30px] max-md:text-[23px] text-gray-500">PLEASE TRY AGAIN LATER!</div>
                    <button onclick="location.reload();" class="bg-black shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] text-white rounded-2xl w-[150px] h-[50px] cursor-pointer hover:bg-white hover:text-black duration-300 border-1 border-black mt-3">ENTER AGAIN!</button>
                </div>
            </div>
        </div

<!--VALID PAGE-->
        <div id="validPage" class="invisible flex justify-center items-center pt-6 max-md:w-[380px] place-self-center">
            <div class="bg-gray-100 w-[900px] h-[200px] max-md:w-full shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] rounded-3xl">
                <div class="flex flex-col ml-5 items-center w-full h-full justify-center max-md:place-self-center text-center">
                    <div class="text-[30px] max-md:text-[23px] text-gray-500">PLEASE DO NOT ENTER BLANK USERNAME 😞</div>
                    <button onclick="location.reload();" class="bg-black shadow-[-1px_3px_13px_10px_rgba(0,_0,_0,_0.1)] text-white rounded-2xl w-[150px] h-[50px] cursor-pointer hover:bg-white hover:text-black duration-300 border-1 border-black mt-3">ENTER AGAIN!</button>
                </div>
            </div>
        </div>

        <script type="text/javascript" src="./src/scripts.js"></script>
    </body>
</html>
